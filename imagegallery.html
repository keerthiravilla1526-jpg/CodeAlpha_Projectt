<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.filters{
    text-align:center;
    margin-bottom:20px;
}

.filters button{
    padding:10px 20px;
    margin:5px;
    border:none;
    background:#333;
    color:white;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

.filters button:hover{
    background:#555;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:35px;
    cursor:pointer;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    color:white;
    font-size:40px;
    cursor:pointer;
    padding:10px;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

@media(max-width:600px){
    .gallery img{
        height:180px;
    }
}
</style>
</head>

<body>

<h1>Image Gallery</h1>

<div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">
    <img src="https://thumbs.dreamstime.com/b/beautiful-rain-forest-ang-ka-nature-trail-doi-inthanon-national-park-thailand-36703721.jpg" class="nature" onclick="openLightbox(0)">
    <img src="https://media.istockphoto.com/id/1403500817/photo/the-craggies-in-the-blue-ridge-mountains.jpg?s=612x612&w=0&k=20&c=N-pGA8OClRVDzRfj_9AqANnOaDS3devZWwrQNwZuDSk=" class="nature" onclick="openLightbox(1)">
    <img src="https://as2.ftcdn.net/v2/jpg/00/78/95/33/1000_F_78953305_H4x46blk1Ej1K67uvKIlPmCxHg69t211.jpg" class="nature" onclick="openLightbox(2)">
    <img src="https://images.unsplash.com/photo-1515963665762-77ef90e624fa?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YmlnJTIwY2l0eXxlbnwwfHwwfHx8MA%3D%3D" class="city" onclick="openLightbox(3)">
    <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Y2l0eSUyMGJhY2tncm91bmR8ZW58MHx8MHx8fDA%3D" class="city" onclick="openLightbox(4)">
<img src ="https://img.magnific.com/free-photo/new-york-city_649448-1679.jpg?semt=ais_hybrid&w=740&q=80" class="city" onclick="openLightbox(5)">
</div>

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeImage(-1)">&#10094;</span>
    <img id="lightbox-img">
    <span class="next" onclick="changeImage(1)">&#10095;</span>
</div>

<script>

const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

let currentIndex = 0;

function openLightbox(index){
    currentIndex = index;
    lightbox.style.display = "flex";
    lightboxImg.src = images[index].src;
}

function closeLightbox(){
    lightbox.style.display = "none";
}

function changeImage(step){
    currentIndex += step;

    if(currentIndex < 0){
        currentIndex = images.length - 1;
    }

    if(currentIndex >= images.length){
        currentIndex = 0;
    }

    lightboxImg.src = images[currentIndex].src;
}

function filterImages(category){
    images.forEach(img=>{
        if(category === 'all'){
            img.style.display = "block";
        }
        else{
            if(img.classList.contains(category)){
                img.style.display = "block";
            }
            else{
                img.style.display = "none";
            }
        }
    });
}

</script>

</body>
</html>
